<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MisanpAIge 2.0</title>
  <style>
    :root { --bg: #faf9f7; --ink: #0f0e0c; --primary: #1e4d2b; }
    [data-theme="dark"] { --bg: #0a0a08; --ink: #f5f5f0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
    .header { position: fixed; top: 0; left: 0; right: 0; height: 64px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; padding: 0 24px; gap: 16px; }
    .logo { font-size: 24px; font-weight: bold; }
    .logo span { color: var(--primary); font-style: italic; }
    .main { display: flex; margin-top: 64px; min-height: calc(100vh - 64px); }
    .sidebar { width: 280px; background: white; border-right: 1px solid #ddd; padding: 24px; }
    .nav-item { display: block; padding: 12px 16px; margin-bottom: 8px; border-radius: 8px; text-decoration: none; color: #666; }
    .nav-item:hover, .nav-item.active { background: #e8f5e9; color: var(--primary); }
    .content { flex: 1; padding: 32px; }
    .card { max-width: 600px; background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    .btn { padding: 12px 24px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">Misanp<span>AI</span>ge</div>
    <button onclick="toggleTheme()">🎨</button>
  </header>
  <div class="main">
    <aside class="sidebar">
      <a href="#" class="nav-item active">📊 Dashboard</a>
      <a href="#" class="nav-item">✍️ Editör</a>
      <a href="#" class="nav-item">🛠️ Araçlar</a>
    </aside>
    <main class="content">
      <div class="card">
        <h1>Hoş geldiniz 👋</h1>
        <p>MisanpAIge 2.0 - AI destekli akademik yazım platformu</p>
        <br>
        <button class="btn" onclick="alert('Yeni proje oluşturuldu!')">+ Yeni Proje</button>
      </div>
    </main>
  </div>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
  </script>
</body>
</html>
